spring.application.name=WineStoreBackend

# 1. Kết nối vào Database MỚI (để tránh rác metadata cũ)
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/wine_store_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Dialect chuẩn cho MySQL 8
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# 3. ĐỔI THÀNH 'none' HOẶC 'update' NHƯNG THÊM DÒNG BỎ QUA VALIDATION
spring.jpa.hibernate.ddl-auto=update

# 4. DÒNG QUYẾT ĐỊNH: Buộc Hibernate không đi tìm bảng cũ để kiểm tra
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.schema_update.unique_constraint_strategy=RECREATE_QUIETLY

# 5. Hiển thị SQL
spring.jpa.show-sql=true

# --- CẤU HÌNH BỔ SUNG: GỬI EMAIL PHẢN HỒI (MỚI) ---
# Sử dụng Gmail SMTP để gửi phản hồi từ Admin đến khách hàng
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# Dán API Key Gemini của Duy vào đây
spring.ai.google.vertexai.gemini.api-key=AIzaSy...your_key
spring.ai.google.vertexai.gemini.model=gemini-1.5-flash

