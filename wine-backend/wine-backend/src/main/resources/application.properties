spring.application.name=WineStoreBackend

# 1. Kết nối Database - Hỗ trợ biến môi trường khi deploy, fallback về localhost khi chạy local
spring.datasource.url=${DATABASE_URL:jdbc:mysql://127.0.0.1:3306/wine_store_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Dialect chuẩn cho MySQL 8
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# 3. Hibernate ddl-auto
spring.jpa.hibernate.ddl-auto=update

# 4. Buộc Hibernate không đi tìm bảng cũ để kiểm tra
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.schema_update.unique_constraint_strategy=RECREATE_QUIETLY

# 5. Hiển thị SQL
spring.jpa.show-sql=true

# --- Server Port (Render tự gán PORT) ---
server.port=${PORT:8080}

